<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mechanical Shop Backend</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
      padding: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #fff;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 420px;
    }
    .links a {
      display: block;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: #7dd3fc;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .links a:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(125, 211, 252, 0.4);
      transform: translateY(-2px);
    }
    .links a strong { color: #38bdf8; }
  </style>
</head>
<body>
  <h1>Mechanical Shop Backend</h1>
  <div class="links">
    <a href="https://mechanicalshopbackend.onrender.com/graphql" target="_blank" rel="noopener">
      <strong>GraphQL</strong> — playground i zapytania
    </a>
    <a href="https://mechanicalshopbackend.onrender.com/api" target="_blank" rel="noopener">
      <strong>Swagger</strong> — dokumentacja API
    </a>
  </div>
</body>
</html>
